<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Business management system</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#0b0b0b;color:white;font-family:Poppins;}
*{transition:0.3s;}

.header{
text-align:center;
padding:15px;
font-size:26px;
color:gold;
border-bottom:1px solid gold;
}

.container{display:flex;gap:15px;padding:15px;}
.left{flex:2;max-height:85vh;overflow:auto;}
.right{flex:1;background:#111;padding:15px;border-radius:10px;border:1px solid gold;}

.card{background:#151515;margin-bottom:12px;padding:12px;border-radius:10px;}
.top{display:flex;justify-content:space-between;}

.btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}

button{
border:none;padding:6px 8px;border-radius:6px;
cursor:pointer;font-size:11px;
}

.price{background:#00c853;color:white;}
.sold{background:red;color:white;}
.discount{background:#ff9800;color:black;}
.delete{background:#ff1744;color:white;}

input{
width:100%;padding:8px;margin-top:8px;
border:none;border-radius:6px;background:#222;color:white;
}

.big{
width:100%;padding:10px;background:gold;
margin-top:10px;font-weight:bold;
}

/* 🔐 LOGIN UI */
#loginBox{
height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}
.loginCard{
background:#111;padding:25px;border-radius:12px;
width:280px;text-align:center;
box-shadow:0 0 20px rgba(255,215,0,0.3);
}
</style>
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginBox">
<div class="loginCard">

<h2 style="color:gold;">Admin Login</h2>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()" class="big">Login</button>

<p id="err" style="color:red;font-size:12px;"></p>

</div>
</div>

<!-- 🔥 ORIGINAL APP (UNCHANGED) -->
<div id="mainApp" style="display:none;">

<div class="header">Business management system</div>

<div class="container">

<div class="left" id="items"></div>

<div class="right">

<h3>Add Item</h3>
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="category" placeholder="Category">
<input id="img" placeholder="Image name (aloo-tikki-burger.jpg)">
<button class="big" onclick="addItem()">ADD ITEM</button>

<hr>

<h3>Global Discount</h3>
<input id="gdisc" placeholder="Enter %">
<button class="big" onclick="setGlobal()">Apply</button>

</div>
</div>

</div>

<script>

// 🔐 LOGIN
function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u === "SAFFRON" && p === "258000"){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("mainApp").style.display="block";
}else{
  document.getElementById("err").innerText="Wrong Password";
}
}

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "saffron-new.firebaseapp.com",
  projectId: "saffron-new"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items=[];

// LOAD ITEMS
db.collection("items").onSnapshot(snap=>{
items=[];
snap.forEach(doc=>{
items.push({id:doc.id,...doc.data()});
});
render();
});

// RENDER
function render(){
let html="";
items.forEach(item=>{

html+=`
<div class="card">

<div class="top">
<div>
<b>${item.name}</b><br>
₹${item.price || item.half+" / "+item.full}<br>
${item.sold ? "❌ Sold Out" : "✅ Available"}
${item.discount ? `<br>🔥 ${item.discount}% OFF` : ""}
</div>
</div>

<div class="btns">

<button class="price" onclick="updatePrice('${item.id}')">Update Price</button>

<button class="sold" onclick="toggleSold('${item.id}',${item.sold})">
${item.sold ? "Undo Sold" : "Mark Sold"}
</button>

<button class="discount" onclick="setDiscount('${item.id}')">Item Discount</button>

<button class="delete" onclick="deleteItem('${item.id}')">Delete</button>

</div>

</div>
`;
});

document.getElementById("items").innerHTML=html;
}

// UPDATE PRICE
function updatePrice(id){
let p=prompt("New Price:");
if(!p) return;
db.collection("items").doc(id).update({price:Number(p)});
}

// SOLD OUT
function toggleSold(id,current){
db.collection("items").doc(id).update({sold:!current});
}

// ITEM DISCOUNT
function setDiscount(id){
let d=prompt("Discount %:");
if(!d) return;
db.collection("items").doc(id).update({discount:Number(d)});
}

// DELETE
function deleteItem(id){
if(confirm("Delete item?")){
db.collection("items").doc(id).delete();
}
}

// ADD ITEM
function addItem(){
let name=nameEl.value;
let price=priceEl.value;
let category=categoryEl.value;
let img=imgEl.value;

if(!name || !price) return alert("Fill data");

db.collection("items").add({
name,
price:Number(price),
category,
img
});

alert("Added");
}

// GLOBAL DISCOUNT
function setGlobal(){
let val=gdisc.value;
if(!val) return;
db.collection("settings").doc("main").set({
discount:Number(val)
});
alert("Global Discount Applied");
}

// INPUT REF
const nameEl=document.getElementById("name");
const priceEl=document.getElementById("price");
const categoryEl=document.getElementById("category");
const imgEl=document.getElementById("img");
const gdisc=document.getElementById("gdisc");

</script>

</body>
</html>
