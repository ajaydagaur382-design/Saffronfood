<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saffron Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#0f0f0f;color:white;}

.header{
padding:15px;
font-size:20px;
font-weight:bold;
background:linear-gradient(135deg,#ff7e5f,#feb47b);
}

.container{padding:10px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
}

.card{
background:#1c1c1c;
padding:10px;
border-radius:12px;
box-shadow:0 0 10px #000;
transition:0.2s;
}
.card:hover{transform:scale(1.03);}

input{
width:100%;
padding:6px;
border:none;
border-radius:6px;
margin-top:5px;
}

button{
margin-top:6px;
padding:6px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.btn1{background:gold;}
.btn2{background:red;color:white;}
.btn3{background:#00c853;color:white;}

.orderBox{
background:#1c1c1c;
margin-top:10px;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🔥 Saffron Admin Panel</div>

<div class="container">

<h3>🛒 Items Control</h3>
<div id="items" class="grid"></div>

<h3>📦 Orders</h3>
<div id="orders"></div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBftbnp4hW65s5SQNwkizgp_nY4jfk80l4",
  authDomain: "saffron-new.firebaseapp.com",
  projectId: "saffron-new",
  storageBucket: "saffron-new.appspot.com",
  messagingSenderId: "645716182774",
  appId: "1:645716182774:web:ff53d375050520698b8ed7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allItems=[];

// LOAD ITEMS
db.collection("items").onSnapshot(snap=>{
allItems=[];
snap.forEach(doc=>{
let d=doc.data();
allItems.push({id:doc.id,...d});
});
renderItems();
});

// RENDER ITEMS
function renderItems(){
let html="";
allItems.forEach(item=>{
html+=`
<div class="card">

<h4>${item.name}</h4>

<div>₹${item.price || (item.half+" / "+item.full)}</div>

<div>Status: ${item.sold ? "❌ Sold Out" : "✅ Available"}</div>

<input id="disc-${item.id}" placeholder="Discount %">

<button class="btn1" onclick="applyDiscount('${item.id}')">Apply Discount</button>

<button class="btn2" onclick="toggleSold('${item.id}', ${item.sold})">
${item.sold ? "Remove Sold Out" : "Mark Sold Out"}
</button>

</div>`;
});

document.getElementById("items").innerHTML=html;
}

// SOLD OUT
function toggleSold(id,current){
db.collection("items").doc(id).update({
sold: !current
});
}

// DISCOUNT
function applyDiscount(id){
let val=document.getElementById("disc-"+id).value;
if(!val) return alert("Enter discount");
db.collection("items").doc(id).update({
discount: Number(val)
});
alert("Discount Applied");
}

// LOAD ORDERS LIVE
db.collection("orders").orderBy("time","desc")
.onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
let o=doc.data();

html+=`
<div class="orderBox">

<div>👤 ${o.name}</div>
<div>📞 ${o.phone}</div>
<div>💰 ₹${o.total}</div>
<div>🍽 ${o.ordertype}</div>
<div>💳 ${o.payment}</div>

${o.address ? `<div>📍 ${o.address}</div>`:""}

<hr>

<button class="btn3" onclick="completeOrder('${doc.id}')">Mark Done</button>

</div>`;
});

document.getElementById("orders").innerHTML=html;
});

// DELETE ORDER
function completeOrder(id){
db.collection("orders").doc(id).delete();
}

</script>

</body>
</html>
