<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saffron Food</title>

<style>
body{margin:0;font-family:Poppins;background:#0f0f0f;color:white;}

.header{
display:flex;
align-items:center;
gap:12px;
padding:14px;
background:linear-gradient(135deg,#ff7e5f,#feb47b);
color:white;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.header img{width:45px;border-radius:50%;border:2px solid white;}
.header h2{margin:0;font-size:18px;}
.header p{margin:0;font-size:12px;}

.search{padding:10px;}
.search input{width:100%;padding:10px;border-radius:6px;border:none;}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
padding:10px;
padding-bottom:80px;
}

.card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-info{
padding:10px;
display:flex;
flex-direction:column;
gap:5px;
}

.price{color:gold;}
.rating{font-size:12px;color:#00ff9d;}

button{
background:gold;
border:none;
padding:5px 8px;
border-radius:5px;
}

.summary{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
}

.popup{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#0009;
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
color:black;
padding:12px;
border-radius:14px;
max-width:220px;
display:flex;
flex-direction:column;
gap:10px;
}

h2{grid-column:1/-1;color:gold;}
</style>
</head>

<body>

<header class="header">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
<div>
<h2>Saffron Food</h2>
<p>Fast Delivery • Fresh Food</p>
</div>
</header>

<div class="search">
<input id="search" placeholder="Search food..." oninput="render()">
</div>

<div id="menu" class="menu"></div>

<div class="summary">
Total ₹<span id="total">0</span>
<button onclick="openPopup()">Order</button>
</div>

<div id="popup" class="popup">
<div class="popup-box">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<select id="payment">
<option>Cash</option>
<option>Online</option>
</select>

<select id="ordertype">
<option>Dining</option>
<option>Take Away</option>
</select>

<button onclick="order()">Confirm</button>
</div>
</div>

<div id="hfPopup" class="popup">
<div class="popup-box">
<button onclick="selectHF('Half')">Half</button>
<button onclick="selectHF('Full')">Full</button>
</div>
</div>

<script>

let items = [

{category:"Burgers"},
{name:"Aloo tikki burger",price:39,img:"images/burger.jpg"},
{name:"Classic veg burger",price:49,img:"images/burger.jpg"},
{name:"Veg cheese burger",price:59,img:"images/burger.jpg"},
{name:"Double patty veg burger",price:79,img:"images/burger.jpg"},
{name:"Saffron Burger",price:99,img:"images/burger.jpg"},

{category:"Snacks"},
{name:"French fries",half:45,full:79,img:"images/fries.jpg"},
{name:"Chilli potato",half:59,full:109,img:"images/fries.jpg"},
{name:"Honey chilli potato",half:69,full:119,img:"images/fries.jpg"},

{category:"Noodles"},
{name:"Plain Veg Noodles",half:59,full:109,img:"images/noodles.jpg"},
{name:"Veg Hakka Noodles",half:69,full:119,img:"images/noodles.jpg"},
{name:"Veg Schezwan Noodles",half:79,full:139,img:"images/noodles.jpg"},
{name:"Veg Chilli Garlic Noodles",half:89,full:159,img:"images/noodles.jpg"},

{category:"Sandwiches"},
{name:"Aloo Grilled Sandwich",price:49,img:"images/sandwich.jpg"},
{name:"Veg Grilled Sandwich",price:69,img:"images/sandwich.jpg"},
{name:"Veg Cheese Grilled Sandwich",price:79,img:"images/sandwich.jpg"},
{name:"Cheese Corn Grilled Sandwich",price:89,img:"images/sandwich.jpg"},
{name:"Paneer & Cheese Grilled Sandwich",price:99,img:"images/sandwich.jpg"},

{category:"Pasta"},
{name:"Veg Red Sauce Pasta",price:59,img:"images/pasta.jpg"},
{name:"Veg White Sauce Pasta",price:69,img:"images/pasta.jpg"},

{category:"Momos"},
{name:"Veg Momos Steam",half:39,full:69,img:"images/momos.jpg"},
{name:"Veg Momos Fried",half:49,full:79,img:"images/momos.jpg"},
{name:"Paneer Momos Steam",half:49,full:89,img:"images/momos.jpg"},
{name:"Paneer Momos Fried",half:69,full:119,img:"images/momos.jpg"},

{category:"Rice"},
{name:"Veg Fried Rice",half:59,full:109,img:"images/rice.jpg"},
{name:"Classic Spicy Veg Fried Rice",half:69,full:119,img:"images/rice.jpg"},
{name:"Veg Schezwan Fried Rice",half:79,full:149,img:"images/rice.jpg"},

{category:"Drinks"},
{name:"Cold Coffee",price:59,img:"images/coffee.jpg"}

];

let cart={},currentItem=null;

function render(){
let html="";
let search=document.getElementById("search").value.toLowerCase();

items.forEach((item,i)=>{
if(item.category){html+=`<h2>${item.category}</h2>`;return;}
if(!item.name.toLowerCase().includes(search)) return;

let price=item.price?`₹${item.price}`:`₹${item.half}/₹${item.full}`;
let qty=0;
for(let k in cart){
if(k.startsWith(i+"_")||k==i) qty+=cart[k];
}

html+=`
<div class="card">
<img src="${item.img}">
<div class="card-info">
<div class="rating">⭐ 4.${Math.floor(Math.random()*5)+1}</div>
<h4>${item.name}</h4>
<div class="price">${price}</div>

${qty==0
? `<button onclick="add(${i})">Add</button>`
: `<button onclick="removeItem(${i})">-</button> ${qty} <button onclick="add(${i})">+</button>`
}

</div>
</div>`;
});

menu.innerHTML=html;
updateTotal();
}

function add(i){
let item=items[i];
if(item.half){currentItem=i;hfPopup.style.display="flex";return;}
cart[i]=(cart[i]||0)+1;
render();
}

function selectHF(type){
let key=currentItem+"_"+type;
cart[key]=(cart[key]||0)+1;
hfPopup.style.display="none";
render();
}

function removeItem(i){
for(let k in cart){
if(k.startsWith(i)){
cart[k]--;
if(cart[k]<=0) delete cart[k];
break;
}
}
render();
}

function updateTotal(){
let t=0;
for(let k in cart){
let [i,type]=k.split("_");
let item=items[i];
let price=item.price||(type=="Half"?item.half:item.full);
t+=price*cart[k];
}
total.innerText=t;
}

function openPopup(){
if(Object.keys(cart).length==0) return alert("Add items first");
popup.style.display="flex";
}

function order(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

if(!name||!phone) return alert("Fill details");

let msg="🍔 Saffron Food Order%0A%0A";

for(let k in cart){
let [i,type]=k.split("_");
let item=items[i];
let price=item.price||(type=="Half"?item.half:item.full);
msg+=`${item.name}${type?` (${type})`:''} x${cart[k]} = ₹${price*cart[k]}%0A`;
}

msg+=`%0ATotal ₹${total.innerText}%0A${name}%0A${phone}`;

window.open(`https://wa.me/918506996505?text=${msg}`, "_blank");
}

render();

</script>

</body>
</html>
