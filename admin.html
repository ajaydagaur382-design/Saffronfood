<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saffron Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#0b0b0b;color:white;font-family:Poppins;}

.header{
text-align:center;
padding:15px;
font-size:28px;
color:gold;
border-bottom:1px solid gold;
}

.container{
display:flex;
gap:15px;
padding:15px;
}

/* LEFT MENU */
.left{
flex:2;
max-height:80vh;
overflow:auto;
}

.item{
background:#151515;
margin-bottom:10px;
padding:12px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.item h4{margin:0;}
.controls{
display:flex;
gap:6px;
flex-wrap:wrap;
}

button{
padding:5px 8px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:11px;
}

.priceBtn{background:#00c853;color:white;}
.soldBtn{background:red;color:white;}
.deleteBtn{background:#ff1744;color:white;}
.discountBtn{background:#ff9800;color:black;}
.addBtn{background:gold;color:black;}

/* RIGHT PANEL */
.right{
flex:1;
background:#111;
padding:15px;
border-radius:12px;
border:1px solid gold;
}

input,select{
width:100%;
padding:8px;
margin-top:8px;
border:none;
border-radius:6px;
background:#222;
color:white;
}

.bigBtn{
margin-top:10px;
width:100%;
padding:10px;
background:gold;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">SAFFRON ADMIN</div>

<div class="container">

<!-- LEFT -->
<div class="left" id="items"></div>

<!-- RIGHT -->
<div class="right">

<h3>Add New Item</h3>

<input id="name" placeholder="Item Name">
<input id="price" placeholder="Price">
<input id="category" placeholder="Category">
<input id="img" placeholder="Image name (aloo-tikki-burger.jpg)">

<button class="bigBtn" onclick="addItem()">ADD ITEM</button>

<hr>

<h3>Global Discount</h3>
<input id="globalDiscount" placeholder="Enter %">
<button class="bigBtn" onclick="setGlobal()">Apply Discount</button>

</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "saffron-new.firebaseapp.com",
  projectId: "saffron-new"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items=[];

// LOAD ITEMS
db.collection("items").onSnapshot(snap=>{
items=[];
snap.forEach(doc=>{
items.push({id:doc.id,...doc.data()});
});
render();
});

// RENDER
function render(){
let html="";
items.forEach(item=>{

html+=`
<div class="item">

<div>
<h4>${item.name}</h4>
<div>₹${item.price || item.half+" / "+item.full}</div>
<div>${item.sold ? "❌ Sold" : "✅ Active"}</div>
</div>

<div class="controls">

<button class="priceBtn" onclick="updatePrice('${item.id}')">Update Price</button>

<button class="soldBtn" onclick="toggleSold('${item.id}',${item.sold})">
${item.sold ? "Undo" : "Sold Out"}
</button>

<button class="discountBtn" onclick="discountItem('${item.id}')">Discount</button>

<button class="deleteBtn" onclick="deleteItem('${item.id}')">Delete</button>

</div>

</div>
`;
});

itemsDiv.innerHTML=html;
}

// UPDATE PRICE
function updatePrice(id){
let val=prompt("Enter new price");
if(!val) return;
db.collection("items").doc(id).update({price:Number(val)});
}

// SOLD OUT
function toggleSold(id,current){
db.collection("items").doc(id).update({sold:!current});
}

// DISCOUNT
function discountItem(id){
let val=prompt("Enter discount %");
if(!val) return;
db.collection("items").doc(id).update({discount:Number(val)});
}

// DELETE
function deleteItem(id){
if(confirm("Delete item?")){
db.collection("items").doc(id).delete();
}
}

// ADD ITEM
function addItem(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let category=document.getElementById("category").value;
let img=document.getElementById("img").value;

if(!name || !price) return alert("Fill all");

db.collection("items").add({
name,
price:Number(price),
category,
img
});

alert("Added");
}

// GLOBAL DISCOUNT
function setGlobal(){
let val=document.getElementById("globalDiscount").value;
if(!val) return;

db.collection("settings").doc("main").set({
discount:Number(val)
});

alert("Global Discount Set");
}

</script>

</body>
</html>
