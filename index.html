<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saffron Food</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#0f0f0f;color:white;}
.header{display:flex;align-items:center;gap:12px;padding:14px;background:linear-gradient(135deg,#ff7e5f,#feb47b);position:sticky;top:0;}
.header img{width:45px;border-radius:50%;border:2px solid white;}
.search{padding:10px;}
.search input{width:100%;padding:10px;border-radius:6px;border:none;}
.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;padding:10px;padding-bottom:80px;}
.card{background:#1c1c1c;border-radius:12px;overflow:hidden;}
.card img{width:100%;height:120px;object-fit:cover;}
.card-info{padding:8px;}
.price{color:gold;}
button{background:gold;border:none;padding:4px 6px;border-radius:5px;cursor:pointer;}
.summary{position:fixed;bottom:0;width:100%;background:#111;padding:10px;display:flex;justify-content:space-between;}
</style>
</head>

<body>

<header class="header">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
<div>
<h2>Saffron Food</h2>
<p>Fast Delivery • Fresh Food</p>
</div>
</header>

<div class="search">
<input id="search" placeholder="Search food..." oninput="render()">
</div>

<div id="menu" class="menu"></div>

<div class="summary">
Total ₹<span id="total">0</span>
</div>

<script>

// ✅ FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBFjbldIGEJAuyEwZaaxx7eg6Wf0tbahzU",
  authDomain: "saffronfood-44c04.firebaseapp.com",
  projectId: "saffronfood-44c04",
  storageBucket: "saffronfood-44c04.firebasestorage.app",
  messagingSenderId: "206462166451",
  appId: "1:206462166451:web:7cccd054aec21e0ade97c6"
};

// ✅ INIT ONLY ONCE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.settings({
  experimentalForceLongPolling: true
});

let items = [];
let cart = {};

// ✅ LOAD DATA
db.collection("items").onSnapshot((snapshot)=>{
  console.log("Snapshot size:", snapshot.size);

  items = [];

  snapshot.forEach(doc=>{
    let d = doc.data();

    items.push({
      name: d.name,
      price: d.price,
      sold: d.sold,
      img: "https://ajaydagaur382-design.github.io/Saffronfood/image/" + d.img
    });
  });

  console.log("Items:", items);
  render();
});

// ✅ RENDER
function render(){
  let html="";
  let search=document.getElementById("search").value.toLowerCase();

  items.forEach((item,i)=>{
    if(!item.name.toLowerCase().includes(search)) return;

    let qty = cart[i] || 0;

    html+=`
    <div class="card">
      <img src="${item.img}">
      <div class="card-info">
        <h4>${item.name}</h4>
        <div class="price">₹${item.price}</div>

        ${item.sold
          ? `<button disabled>Sold Out</button>`
          : qty==0
          ? `<button onclick="add(${i})">Add</button>`
          : `<button onclick="removeItem(${i})">-</button> ${qty} <button onclick="add(${i})">+</button>`
        }
      </div>
    </div>`;
  });

  document.getElementById("menu").innerHTML = html;
  updateTotal();
}

// ✅ CART
function add(i){
  cart[i]=(cart[i]||0)+1;
  render();
}

function removeItem(i){
  cart[i]--;
  if(cart[i]<=0) delete cart[i];
  render();
}

function updateTotal(){
  let t=0;
  for(let i in cart){
    t+=items[i].price*cart[i];
  }
  document.getElementById("total").innerText = t;
}

</script>

</body>
</html>
