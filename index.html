<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saffron Food</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#0f0f0f;color:white;}

.header{
display:flex;align-items:center;gap:12px;padding:14px;
background:linear-gradient(135deg,#ff7e5f,#feb47b);
position:sticky;top:0;z-index:1000;
}

.header img{width:45px;border-radius:50%;}

.search{padding:10px;}
.search input{width:100%;padding:10px;border-radius:6px;border:none;}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:10px;
padding-bottom:120px;
}

.card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
transition:0.2s;
}
.card:hover{transform:scale(1.03);}

.card img{width:100%;height:120px;object-fit:cover;}

.card-info{padding:8px;}
.price{color:gold;}
.rating{font-size:12px;color:#00ff9d;}

button{
background:gold;border:none;padding:5px;border-radius:5px;
cursor:pointer;font-size:12px;
}
button:hover{opacity:0.8;}

.summary{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:999;
box-shadow:0 -3px 10px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<header class="header">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
<div>
<h2>Saffron Food</h2>
<p>Fast Delivery • Fresh Food</p>
</div>
</header>

<div class="search">
<input id="search" placeholder="Search food..." oninput="render()">
</div>

<div id="menu" class="menu"></div>

<div class="summary">
Total ₹<span id="total">0</span>
<button onclick="alert('Order feature connected with WhatsApp already')">Order</button>
</div>

<script>

// ✅ FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBftbnp4hW65s5SQNwkizgp_nY4jfk80l4",
  authDomain: "saffron-new.firebaseapp.com",
  projectId: "saffron-new",
  storageBucket: "saffron-new.appspot.com",
  messagingSenderId: "645716182774",
  appId: "1:645716182774:web:ff53d375050520698b8ed7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.settings({ experimentalForceLongPolling: true });

let items = [];
let cart = {};

// ✅ LOAD DATA (REALTIME)
db.collection("items").onSnapshot(snapshot=>{
  items = [];

  snapshot.forEach(doc=>{
    let d = doc.data();

    items.push({
      name: d.name,
      price: d.price,
      sold: d.sold,
      img: d.img   // ✅ FIXED (firebase image)
    });
  });

  render();
});

// ✅ RENDER
function render(){
  let html="";
  let search=document.getElementById("search").value.toLowerCase();

  items.forEach((item,i)=>{
    if(!item.name.toLowerCase().includes(search)) return;

    let qty = cart[i] || 0;

    html+=`
    <div class="card">
      <img src="${item.img}">
      <div class="card-info">

        <div class="rating">⭐ 4.${Math.floor(Math.random()*5)+1}</div>

        <h4>${item.name}</h4>
        <div class="price">₹${item.price}</div>

        ${item.sold
          ? `<button disabled style="background:red;color:white;">Sold Out</button>`
          : qty==0
          ? `<button onclick="add(${i})">Add</button>`
          : `<button onclick="removeItem(${i})">-</button> ${qty} <button onclick="add(${i})">+</button>`
        }

      </div>
    </div>`;
  });

  document.getElementById("menu").innerHTML = html;
  updateTotal();
}

// ✅ CART
function add(i){
  cart[i]=(cart[i]||0)+1;
  render();
}

function removeItem(i){
  cart[i]--;
  if(cart[i]<=0) delete cart[i];
  render();
}

function updateTotal(){
  let t=0;
  for(let i in cart){
    t+=items[i].price*cart[i];
  }
  document.getElementById("total").innerText = t;
}

</script>

</body>
</html>
