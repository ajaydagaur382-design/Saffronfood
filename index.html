<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saffron Food</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#0f0f0f;color:white;}

.header{
display:flex;
align-items:center;
gap:10px;
padding:10px;
background:rgba(255,126,95,0.7);  /* glass color */
backdrop-filter:blur(10px);       /* 🔥 glass effect */
-webkit-backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
box-shadow:0 4px 20px rgba(0,0,0,0.4); /* shadow */
border-bottom:1px solid rgba(255,255,255,0.2);
}
display:flex;
align-items:center;
gap:10px;
padding:10px;
background:linear-gradient(135deg,#ff7e5f,#feb47b);
position:sticky;
top:0;
z-index:1000;
}

.header img{
width:34px;
border-radius:50%;
}

.header h2{
font-size:18px;
margin:0;
}

.header p{
font-size:12px;
margin:0;
}

.offer{
width:100%;
text-align:center;
background:#000;
color:gold;
font-weight:bold;
padding:5px;
font-size:14px;
}

.search{padding:10px;}
.search input{width:100%;padding:10px;border-radius:6px;border:none;}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:10px;
padding-bottom:120px;
}

.card{background:#1c1c1c;border-radius:12px;overflow:hidden;}
.card img{width:100%;height:120px;object-fit:cover;}

.card-info{padding:8px;}
.price{color:gold;}
.rating{font-size:12px;color:#00ff9d;}

button{
background:gold;border:none;padding:6px;border-radius:6px;
cursor:pointer;font-size:12px;
}

.summary{
position:fixed;bottom:0;width:100%;
background:#111;padding:12px;
display:flex;justify-content:space-between;align-items:center;
}

.summary button{
padding:10px 15px;
background:linear-gradient(45deg,#ff9800,#ff5722);
color:white;font-weight:bold;
}

.category{
grid-column:1/-1;
font-weight:bold;
padding:10px;
background:linear-gradient(135deg,#ff7e5f,#feb47b);
color:black;
border-radius:8px;
}

.popup{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:#0009;
display:none;justify-content:center;align-items:center;
}

.popup-box{
background:white;color:black;
padding:15px;border-radius:10px;
display:flex;flex-direction:column;gap:8px;
}
</style>
</head>

<body>

<header class="header">
<img src="https://ajaydagaur382-design.github.io/Saffronfood/image/logo.png" onerror="this.src='https://via.placeholder.com/100'">
<div>
<h2>Saffron Food</h2>
<p>Fast Delivery • Fresh Food</p>
</div>
</header>

<div id="offer" class="offer"></div>

<div class="search">
<input id="search" placeholder="Search food..." oninput="render()">
</div>

<div id="menu" class="menu"></div>

<div class="summary">
Total ₹<span id="total">0</span>
<button onclick="openPopup()">Place Order</button>
</div>

<!-- ORDER POPUP -->
<div id="popup" class="popup">
<div class="popup-box">

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address (for Take Away)">

<select id="payment">
<option value="Cash">Cash</option>
<option value="Online">Online</option>
</select>

<select id="ordertype">
<option value="Dining">Dining</option>
<option value="Take Away">Take Away</option>
</select>

<button onclick="order()">Confirm</button>
<button onclick="closePopup()">Back</button>

</div>
</div>

<!-- SIZE POPUP -->
<div id="sizePopup" class="popup">
<div class="popup-box">
<h3>Select Size</h3>
<button onclick="selectHalf()">Half</button>
<button onclick="selectFull()">Full</button>
<button onclick="closeSize()">Cancel</button>
</div>
</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBftbnp4hW65s5SQNwkizgp_nY4jfk80l4",
  authDomain: "saffron-new.firebaseapp.com",
  projectId: "saffron-new",
  storageBucket: "saffron-new.appspot.com",
  messagingSenderId: "645716182774",
  appId: "1:645716182774:web:ff53d375050520698b8ed7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.settings({ experimentalForceLongPolling: true });

let items = [];
let cart = {};
let selectedIndex = null;
let globalDiscount = 0;

const orderList = ["burger","snacks","noodles","sandwich","pasta","momos","paratha","maggi","rice","drink","extra"];

// 🔥 GLOBAL DISCOUNT LISTENER
db.collection("settings").doc("main").onSnapshot(doc=>{
if(doc.exists){
globalDiscount = doc.data().discount || 0;
offer.innerHTML = globalDiscount ? `🔥 ${globalDiscount}% OFF TODAY` : "";
}
});

// LOAD ITEMS
db.collection("items").onSnapshot(snap=>{
items=[];
snap.forEach(doc=>{
let d=doc.data();
items.push({
name:d.name,
price:d.price || null,
half:d.half || null,
full:d.full || null,
category:d.category,
discount:d.discount || 0,
sold:d.sold || false,
img: d.img && d.img.startsWith("http")
  ? d.img
  : "https://ajaydagaur382-design.github.io/Saffronfood/image/" + d.img
});
});
render();
});

// RENDER
function render(){
let html="";
let search=document.getElementById("search").value.toLowerCase();

orderList.forEach(cat=>{
let filtered=items.filter(i=>i.category===cat && i.name.toLowerCase().includes(search));
if(filtered.length==0) return;

html+=`<div class="category">${cat.toUpperCase()}</div>`;

filtered.forEach(item=>{
let i=items.indexOf(item);
let qty=cart[i]?.qty || 0;

html+=`
<div class="card">
<img src="${item.img}">
<div class="card-info">

<div class="rating">⭐ 4.${Math.floor(Math.random()*5)+1}</div>

<h4>${item.name}</h4>

<div class="price">
${
item.price 
? item.discount 
  ? `<s>₹${item.price}</s> ₹${Math.floor(item.price - (item.price*item.discount/100))}`
  : `₹${item.price}`
: item.discount
  ? `Half <s>₹${item.half}</s> ₹${Math.floor(item.half - (item.half*item.discount/100))} 
     / Full <s>₹${item.full}</s> ₹${Math.floor(item.full - (item.full*item.discount/100))}`
  : `Half ₹${item.half} / Full ₹${item.full}`
}
</div>

${item.sold
? `<button disabled style="background:red;color:white;">Sold Out</button>`
: qty==0
? `<button onclick="handleAdd(${i})">Add</button>`
: `<button onclick="removeItem(${i})">-</button> ${qty} <button onclick="handleAdd(${i})">+</button>`
}

</div>
</div>`;
});
});

menu.innerHTML=html;
updateTotal();
}

// ADD
function handleAdd(i){
if(items[i].half && items[i].full){
selectedIndex=i;
sizePopup.style.display="flex";
}else{
add(i, items[i].price);
}
}

function selectHalf(){
add(selectedIndex, items[selectedIndex].half, "Half");
closeSize();
}

function selectFull(){
add(selectedIndex, items[selectedIndex].full, "Full");
closeSize();
}

function closeSize(){
sizePopup.style.display="none";
}

function add(i, price, size=""){
if(!cart[i]) cart[i]={qty:0, price:price, size:size};
cart[i].qty++;
render();
}

function removeItem(i){
cart[i].qty--;
if(cart[i].qty<=0) delete cart[i];
render();
}

function updateTotal(){
let t=0;
for(let i in cart){
t+=cart[i].price*cart[i].qty;
}

let final = globalDiscount ? t - (t * globalDiscount / 100) : t;
total.innerText=final;
}

// POPUP
function openPopup(){
if(Object.keys(cart).length==0){alert("Add items");return;}
popup.style.display="flex";
}

function closePopup(){
popup.style.display="none";
}

// ORDER FUNCTION SAME
function order(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;
let payment = document.getElementById("payment").value;
let ordertype = document.getElementById("ordertype").value;

if(!name || !phone){
alert("Name & Phone required");
return;
}

if(ordertype === "Take Away" && !address){
alert("Address required");
return;
}

let msg="🍔 *Saffron Order*%0A%0A";

for(let i in cart){
let item=items[i];
msg+=`${item.name} ${cart[i].size ? "(" + cart[i].size + ")" : ""} x${cart[i].qty} = ₹${cart[i].price*cart[i].qty}%0A`;
}

msg+=`%0A💰 ₹${total.innerText}%0A%0A`;

msg+=`👤 ${name}%0A`;
msg+=`📞 ${phone}%0A`;
msg+=`🍽 ${ordertype}%0A`;
msg+=`💳 ${payment}%0A`;

if(ordertype==="Take Away"){
msg+=`📍 ${address}%0A`;
}

db.collection("orders").add({
name, phone, address, payment, ordertype,
total: total.innerText,
cart: cart,
time: new Date()
});

window.open(`https://wa.me/918449481394?text=${msg}`);

closePopup();
}
</script>

</body>
</html>
