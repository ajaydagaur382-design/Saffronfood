<script>

let items = [

{category:"Burgers"},
{name:"Aloo tikki burger",price:39},
{name:"Classic veg burger",price:49},
{name:"Veg cheese burger",price:59},
{name:"Double patty veg burger",price:79},
{name:"Saffron Burger",price:99},

{category:"Snacks"},
{name:"French fries",half:45,full:79},
{name:"Chilli potato",half:59,full:109},
{name:"Honey chilli potato",half:69,full:119},

{category:"Noodles"},
{name:"Plain Veg Noodles",half:59,full:109},
{name:"Veg Hakka Noodles",half:69,full:119},
{name:"Veg Schezwan Noodles",half:79,full:139},
{name:"Veg Chilli Garlic Noodles",half:89,full:159},

{category:"Sandwiches"},
{name:"Aloo Grilled Sandwich",price:49},
{name:"Veg Grilled Sandwich",price:69},
{name:"Veg Cheese Grilled Sandwich",price:79},
{name:"Cheese Corn Grilled Sandwich",price:89},
{name:"Paneer Cheese Grilled Sandwich",price:99},

{category:"Pasta"},
{name:"Veg Red Sauce Pasta",price:59},
{name:"Veg White Sauce Pasta",price:69},

{category:"Momos"},
{name:"Veg Momos Steam",half:39,full:69},
{name:"Veg Momos Fried",half:49,full:79},
{name:"Paneer Momos Steam",half:49,full:89},
{name:"Paneer Momos Fried",half:69,full:119},

{category:"Paratha"},
{name:"Aloo Paratha",price:49},
{name:"Aloo Pyaz Paratha",price:59},
{name:"Gobhi Paratha",price:69},
{name:"Paneer Paratha",price:79},

{category:"Maggi"},
{name:"Plain Maggi",price:39},
{name:"Veg Maggi",price:49},

{category:"Rice"},
{name:"Veg Fried Rice",half:59,full:109},
{name:"Classic Spicy Veg Fried Rice",half:69,full:119},
{name:"Veg Schezwan Fried Rice",half:79,full:149},

{category:"Drinks"},
{name:"Cold Coffee",price:59}

];

let cart={},currentItem=null;

function render(){
let html="";
let search=document.getElementById("search").value.toLowerCase();

items.forEach((item,i)=>{

if(item.category){
html+=`<h2>${item.category}</h2>`;
return;
}

if(!item.name.toLowerCase().includes(search)) return;

let price=item.price?`₹${item.price}`:`₹${item.half}/₹${item.full}`;

let qty=0;
for(let k in cart){
if(k.startsWith(i+"_")||k==i) qty+=cart[k];
}

// 🔥 IMAGE AUTO GENERATE
let imgName = item.name.toLowerCase().replace(/ & /g,'-').replace(/ /g,'-');

html+=`
<div class="card">

<img src="image/${imgName}.jpg">

<div class="card-info">

<div class="rating">⭐ 4.${Math.floor(Math.random()*5)+1}</div>

<h4>${item.name}</h4>

<div class="price">${price}</div>

${qty==0
? `<button onclick="add(${i})">Add</button>`
: `<button onclick="removeItem(${i})">-</button> ${qty} <button onclick="add(${i})">+</button>`
}

</div>
</div>`;
});

menu.innerHTML=html;
updateTotal();
}
