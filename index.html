<!DOCTYPE html>
<html>
<head>
  <title>Food Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .category-header {
      position: sticky;
      top: 0;
      background: white;
      padding: 12px;
      font-weight: bold;
      font-size: 18px;
      border-bottom: 2px solid #eee;
      z-index: 10;
    }

    .container {
      padding-bottom: 80px;
    }

    .card {
      display: flex;
      background: white;
      margin: 10px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
    }

    .card-content {
      flex: 1;
      padding: 10px;
    }

    .price {
      font-weight: bold;
      margin-top: 5px;
    }

    .add-btn {
      background: linear-gradient(45deg, #ff4e50, #fc913a);
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
    }

    .add-btn:hover {
      opacity: 0.9;
    }

    .order-btn {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: linear-gradient(45deg, #36d1dc, #5b86e5);
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      border: none;
    }

    /* Popup */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .popup button {
      margin: 5px;
      padding: 8px 12px;
    }
  </style>
</head>

<body>

<div class="container" id="menu"></div>

<button class="order-btn" onclick="sendOrder()">Place Order</button>

<!-- Popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <p>Select option</p>
    <button onclick="selectOption('half')">Half</button>
    <button onclick="selectOption('full')">Full</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const categoryOrder = [
    "burger","snacks","noodles","sandwich","pasta",
    "momos","paratha","maggi","rice","drink","extra"
  ];

  let cart = [];
  let selectedItem = null;

  db.collection("items").onSnapshot(snapshot => {
    let items = [];

    snapshot.forEach(doc => {
      items.push({ id: doc.id, ...doc.data() });
    });

    renderItems(items);
  });

  function renderItems(items) {
    const menu = document.getElementById("menu");
    menu.innerHTML = "";

    let grouped = {};

    items.forEach(item => {
      if (!grouped[item.category]) grouped[item.category] = [];
      grouped[item.category].push(item);
    });

    categoryOrder.forEach(cat => {
      if (!grouped[cat]) return;

      let header = document.createElement("div");
      header.className = "category-header";
      header.innerText = cat.toUpperCase();
      menu.appendChild(header);

      grouped[cat].forEach(item => {
        let card = document.createElement("div");
        card.className = "card";

        let imgSrc = item.img || "https://via.placeholder.com/100";

        card.innerHTML = `
          <img src="${imgSrc}">
          <div class="card-content">
            <div>${item.name}</div>
            <div class="price">
              ${item.half && item.full 
                ? `Half ₹${item.half} / Full ₹${item.full}`
                : `₹${item.price}`
              }
            </div>
            <button class="add-btn">Add</button>
          </div>
        `;

        card.querySelector(".add-btn").onclick = () => {
          if (item.half && item.full) {
            selectedItem = item;
            document.getElementById("popup").style.display = "flex";
          } else {
            cart.push({ name: item.name, price: item.price });
          }
        };

        menu.appendChild(card);
      });
    });
  }

  function selectOption(type) {
    if (!selectedItem) return;

    if (type === "half") {
      cart.push({
        name: selectedItem.name + " (Half)",
        price: selectedItem.half
      });
    } else {
      cart.push({
        name: selectedItem.name + " (Full)",
        price: selectedItem.full
      });
    }

    document.getElementById("popup").style.display = "none";
  }

  function sendOrder() {
    if (cart.length === 0) {
      alert("Cart is empty");
      return;
    }

    let message = "Order:\n";

    cart.forEach(item => {
      message += `${item.name} - ₹${item.price}\n`;
    });

    let url = `https://wa.me/91XXXXXXXXXX?text=${encodeURIComponent(message)}`;
    window.open(url, "_blank");
  }
</script>

</body>
</html>
